site_name: 信奥爱好者 OIer Fans # 设置网站名称

# 导航目录
nav:
  - 首页: index.md
  - C++语言基础:
      - 基础语法:
          - 输入输出:
              - scanf: cpp_reference/cstdio/scanf.md
          - 分支结构:
              - switch语句: cpp/switch.md
      - STL模板:
          - STL介绍: cpp_reference/STL/stl.md
          - "map": cpp_reference/STL/map.md
  - 算法基础:
      - 前缀和: basic_algorithm/prefix_sum.md
  - 数学问题:
      - 唯一分解定理: math/unique_factorization.md
      - 最大公约数/最小公倍数: math/gcd_lcm.md

# Theme 主题设置
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.expand
  language: 'zh'
  font:
    text: 'Fira Sans'
    code: 'Fira Mono'
  palette: # 白天模式/黑夜模式
    # Toggle light mode
    - scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Toggle dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to light mode

# 设置底部
copyright: 'Copyright &copy; 2024 - 2026 oier.fans All Rights Reserved.'
extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:<admin@oier.fans>
      name: 联系邮箱
  # generator: false # 移除生成标记 Made with Material for MkDocs

# markdown: kramdown